name: Calendar Sync

on:
  schedule:
    # Ejecuta cada 20 min entre 7am-5pm UTC (lunes a viernes)
    # El control fino de 17:30 lo maneja scheduler_rules.py internamente
    - cron: '*/20 7-17 * * 1-5'
  workflow_dispatch:

jobs:
  sync-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calendar sync
        env:
          OUTLOOK_ICS_URL: ${{ secrets.OUTLOOK_ICS_URL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python -m app.sync

      - name: Save sync state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: update sync state [skip ci]"
          git push
